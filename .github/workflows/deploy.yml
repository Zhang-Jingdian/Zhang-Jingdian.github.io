name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4


      # 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8.7.0'  # 你可以调整为你需要的 pnpm 版本

      # 安装依赖并构建项目
      - name: Install dependencies
        run: pnpm install

      - name: Build the project
        run: pnpm build

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
           path: . # 存储库中 Astro 项目的根位置。（可选）
           node-version: 22.11.0 # 用于构建站点的特定 Node.js 版本，默认为 20。（可选）
           package-manager: pnpm@9.12.3 # 应使用哪个 Node.js 包管理器来安装依赖项和构建站点。会根据存储库中的 lockfile 自动检测。（可选）


  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
