<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pseudo-class Example: Hover & Active</title>
    <style>
        /* Basic button styling */
        .button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        /* Change color when hovering over the button */
        .button:hover {
            background-color: #0056b3;
        }

        /* Add a pressed effect when the button is clicked */
        .button:active {
            background-color: #003d80;
            transform: translateY(2px);
        }
    </style>
</head>

<body>
    <button class="button">Click Me</button>
</body>

</html>
